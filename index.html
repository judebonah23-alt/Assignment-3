<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text and BMI Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Text and BMI Analyzer</h1>
        
        <div class="card">
            <h2>Vowel and Consonant Counter</h2>
            <textarea id="inputText" placeholder="Enter your text here..."></textarea>
            <button onclick="analyzeText()">Analyze Text</button>
            <p id="vowelResults"></p>
            <p id="consonantResults"></p>
        </div>
        <div class="card">
            <h2>BMI Calculator</h2>
            <input type="number" id="weight" placeholder="Weight in pounds">
            <input type="number" id="height" placeholder="Height in feet">
            <input type="number" id="heightInInches" placeholder="Height in inches">
            <button onclick="calculateBMI()">Calculate BMI</button>
            <p id="bmiResults"></p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
